<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OpenWeather API Link</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="card">
      <p class="eyebrow">Weather API</p>
      <h1>OpenWeather API</h1>
      <p class="description">
        Click the button below to open the API website.
      </p>

      <a
        id="apiLink"
        class="api-link"
        href="https://api.openweathermap.org"
        target="_blank"
        rel="noopener noreferrer"
      >
        https://api.openweathermap.org
      </a>

      <button id="showLinkBtn" class="button">Display API Link</button>
      <p id="output" class="output"></p>
    </main>

    <script src="script.js"></script>
  </body>
</html>
