<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Weather App</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <h1>Weather App</h1>
      <a href="https://api.openweathermap.org" target="_blank">OpenWeather API</a>

      <button id="themeBtn">Dark Mode</button>

      <div class="controls">
        <input id="search" type="text" placeholder="Search city" />

        <select id="filter">
          <option value="all">All</option>
          <option value="Clear">Clear</option>
          <option value="Rain">Rain</option>
          <option value="Clouds">Clouds</option>
        </select>

        <select id="sort">
          <option value="default">Default</option>
          <option value="asc">Temp Low to High</option>
          <option value="desc">Temp High to Low</option>
          <option value="name">Name A-Z</option>
        </select>
      </div>

      <p id="info"></p>
      <div id="cards"></div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
